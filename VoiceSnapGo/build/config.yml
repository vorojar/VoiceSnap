version: '3'

info:
  companyName: "VoiceSnap"
  productName: "VoiceSnap"
  productIdentifier: "com.voicesnap.app"
  description: "Offline voice to text tool"
  copyright: "(c) 2025, VoiceSnap"
  comments: "Press and hold hotkey to record, release to transcribe"
  version: "2.0.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - models
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: wails3 task common:install:frontend:deps
      type: once
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: go mod tidy
      type: blocking
    - cmd: wails3 task build
      type: blocking
    - cmd: wails3 task run
      type: primary
